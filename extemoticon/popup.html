<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sentiment Heatmap</title>
  <style>
    /* ── Reset & base ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      padding: 20px 16px 16px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .emoji { font-size: 22px; }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .toggle-label {
      font-size: 13px;
      color: #ccc;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    input:checked + .slider { background: #22c55e; }
    input:checked + .slider::before { transform: translateX(18px); }

    /* ── Legend ── */
    .legend-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #bbb;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.positive { background: #22c55e; }
    .dot.negative { background: #ef4444; }
    .dot.neutral  { background: #9ca3af; }

    /* ── Phase badge ── */
    .phase {
      margin-top: 16px;
      font-size: 10px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="emoji">🌡️</span>
    <div>
      <div class="title">Sentiment Heatmap</div>
      <div class="subtitle">YouTube comments</div>
    </div>
  </div>

  <!-- Toggle switch -->
  <div class="toggle-row">
    <span class="toggle-label">Enable highlighting</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Color legend -->
  <div class="legend-title">Legend</div>
  <div class="legend">
    <div class="legend-item">
      <div class="dot positive"></div>
      <span>Positive comment</span>
    </div>
    <div class="legend-item">
      <div class="dot negative"></div>
      <span>Negative comment</span>
    </div>
    <div class="legend-item">
      <div class="dot neutral"></div>
      <span>Neutral comment</span>
    </div>
  </div>

  <div class="phase">Phase 1 — keyword detection</div>

  <script src="popup.js"></script>
</body>
</html>
